<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="min-h-screen">

    <canvas id="particles-js"></canvas>

    <header class="glass-panel sticky top-0 z-50 border-b border-purple-500/20">
        <div class="max-w-7xl mx-auto px-6 py-8 text-center md:text-left">
            <h1 class="text-2xl md:text-4xl font-tech font-bold gradient-text tracking-wider uppercase">
                Carlos David Escandón Marcos
            </h1>
            <p class="text-white text-sm md:text-base font-medium mt-1 tracking-widest opacity-90">
                Desarrollo Web Profesional
            </p>
            <div id="estado" class="mt-4 p-2 rounded border border-purple-500/30 bg-black/60 text-xs hidden"></div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-10 relative">
        <section id="controles"
            class="glass-panel p-6 rounded-2xl flex flex-col md:flex-row gap-6 items-center justify-between mb-12">
            <div class="relative w-full md:w-1/3">
                <input type="search" id="busqueda"
                    class="w-full bg-black/50 border border-purple-500/30 rounded-xl py-3 pl-12 pr-4 text-white focus:ring-2 focus:ring-pink-500 outline-none transition-all"
                    placeholder="Buscar Usuarios...">
                <span class="absolute left-4 top-3.5 text-purple-400">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </span>
            </div>

            <div class="flex gap-4 w-full md:w-auto">
                <button id="btnCargar"
                    class="btn-primary flex-1 md:flex-none text-white px-8 py-3 rounded-xl font-bold uppercase text-sm tracking-widest">
                    Cargar Usuarios
                </button>
                <button id="btnLimpiar"
                    class="bg-white/5 hover:bg-white/10 text-gray-400 px-8 py-3 rounded-xl font-bold uppercase text-sm tracking-widest border border-white/10 transition-all">
                    Reset
                </button>
            </div>
        </section>

        <!-- Estado de Carga Global -->
        <div id="spinner" class="hidden flex-col items-center justify-center py-20">
            <div class="loader mb-4"></div>
            <p class="text-pink-500 font-tech animate-pulse tracking-widest">Buscar usuarios...</p>
        </div>

        <section id="contenedor-usuarios" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></section>
    </main>

    <script type="module" src="dashboard.js"></script>
</body>

</html>
